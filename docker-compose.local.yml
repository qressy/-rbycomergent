name: rbycomergent

volumes:
  rbycomergent_local_postgres_data: {}
  rbycomergent_local_postgres_data_backups: {}
  rbycomergent_local_redis_data: {}

services:
  django: &django
    build:
      context: .
      dockerfile: ./compose/local/django/Dockerfile
    image: rbycomergent_local_django
    container_name: rbycomergent_local_django
    depends_on:
      - postgres
      - redis
      - mailpit
    volumes:
      - /app/.venv
      - .:/app:z
    env_file:
      - ./.envs/.local/.django
      - ./.envs/.local/.postgres
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:${POSTGRES_PORT:-5432}/${POSTGRES_DB}
    ports:
      - '8000:8000'
    command: /start

  postgres:
    build:
      context: .
      dockerfile: ./compose/production/postgres/Dockerfile
    image: rbycomergent_production_postgres
    container_name: rbycomergent_local_postgres
    volumes:
      - rbycomergent_local_postgres_data:/var/lib/postgresql/data
      - rbycomergent_local_postgres_data_backups:/backups
    env_file:
      - ./.envs/.local/.postgres

  mailpit:
    image: docker.io/axllent/mailpit:latest
    container_name: rbycomergent_local_mailpit
    ports:
      - "8025:8025"

  redis:
    image: docker.io/redis:7.2
    container_name: rbycomergent_local_redis
    volumes:
      - rbycomergent_local_redis_data:/data

  celeryworker:
    <<: *django
    image: rbycomergent_local_celeryworker
    container_name: rbycomergent_local_celeryworker
    depends_on:
      - redis
      - postgres
      - mailpit
    ports: []
    command: /start-celeryworker

  celerybeat:
    <<: *django
    image: rbycomergent_local_celerybeat
    container_name: rbycomergent_local_celerybeat
    depends_on:
      - redis
      - postgres
      - mailpit
    ports: []
    command: /start-celerybeat
