{% load i18n %}

<div id="settings-notifications">
  <form method="post"
        action="{% url 'tracking:dashboard_settings_notifications' %}"
        hx-post="{% url 'tracking:dashboard_settings_notifications' %}"
        hx-target="#settings-notifications"
        hx-swap="outerHTML"
        hx-indicator="#global-loading">
    {% csrf_token %}
    <div class="form-control gap-2">
      <label class="label" for="{{ notification_form.cadence.id_for_label }}">
        <span class="label-text">{% translate "Email frequency" %}</span>
      </label>
      <select class="select select-bordered w-full max-w-sm"
              name="{{ notification_form.cadence.name }}"
              id="{{ notification_form.cadence.id_for_label }}">
        {% for value, label in notification_form.cadence.field.choices %}
          <option value="{{ value }}"
                  {% if notification_form.cadence.value == value %}selected{% endif %}>{{ label }}</option>
        {% endfor %}
      </select>
      {% if notification_form.cadence.errors %}
        <p class="text-sm text-error">{{ notification_form.cadence.errors|join:", " }}</p>
      {% endif %}
    </div>
    {% if notifications_saved %}
      <div role="alert" class="alert alert-success mt-3">
        <span>{% translate "Notification settings saved." %}</span>
      </div>
    {% endif %}
    <button type="submit" class="btn btn-primary btn-sm mt-4">{% translate "Save" %}</button>
  </form>
</div>
