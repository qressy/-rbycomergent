{% load i18n %}

<aside class="bg-neutral text-neutral-content w-64 min-h-screen flex flex-col">
  <!-- Branding -->
  <a href="{% url 'tracking:dashboard' %}"
     class="flex items-center gap-2 px-5 py-4 border-b border-white/10">
    <span class="font-mono text-lg font-bold tracking-tight">chattersift</span>
  </a>
  <!-- Navigation -->
  <ul class="menu menu-md flex-1 px-3 py-4 gap-1 [--menu-active-bg:color-mix(in_oklch,var(--color-neutral-content)_15%,transparent)] [--menu-active-fg:var(--color-neutral-content)]">
    <li class="{% if dash_active_nav == 'monitors' %}menu-active{% endif %}">
      <a href="{% url 'tracking:dashboard' %}" class="gap-3">
        <svg xmlns="http://www.w3.org/2000/svg"
             class="h-5 w-5"
             fill="none"
             viewBox="0 0 24 24"
             stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
        </svg>
        {% translate "Monitors" %}
      </a>
    </li>
    <li class="{% if dash_active_nav == 'settings' %}menu-active{% endif %}">
      <a href="{% url 'tracking:dashboard_settings' %}" class="gap-3">
        <svg xmlns="http://www.w3.org/2000/svg"
             class="h-5 w-5"
             fill="none"
             viewBox="0 0 24 24"
             stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
        </svg>
        {% translate "Settings" %}
      </a>
    </li>
  </ul>
</aside>
