{% load i18n %}

<div id="settings-profile">
  <form method="post"
        action="{% url 'tracking:dashboard_settings_profile' %}"
        hx-post="{% url 'tracking:dashboard_settings_profile' %}"
        hx-target="#settings-profile"
        hx-swap="outerHTML"
        hx-indicator="#global-loading">
    {% csrf_token %}
    <div class="form-control gap-2">
      <label class="label" for="id_name">
        <span class="label-text">{% translate "Display name" %}</span>
      </label>
      <input id="id_name"
             name="name"
             type="text"
             maxlength="255"
             value="{{ profile_form.name.value|default_if_none:'' }}"
             class="input input-bordered w-full max-w-sm" />
      {% if profile_form.name.errors %}
        <p class="text-sm text-error">{{ profile_form.name.errors|join:", " }}</p>
      {% endif %}
    </div>
    {% if profile_saved %}
      <div role="alert" class="alert alert-success mt-3">
        <span>{% translate "Profile updated." %}</span>
      </div>
    {% endif %}
    <button type="submit" class="btn btn-primary btn-sm mt-4">{% translate "Update" %}</button>
  </form>
</div>
