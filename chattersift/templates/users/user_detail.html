{% extends "base.html" %}

{% load static i18n %}

{% block title %}
  {{ object.email }}
{% endblock title %}
{% block content %}
  <div class="space-y-4">
    <h2 class="text-2xl font-bold">{{ object.email }}</h2>
    {% if object == request.user %}
      <a class="btn btn-primary btn-sm"
         href="{% url 'tracking:dashboard_settings' %}">{% translate "Go to Settings" %}</a>
    {% endif %}
  </div>
{% endblock content %}
