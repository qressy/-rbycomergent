{% load allauth %}

{% if attrs.type == "textarea" %}
  <div class="mb-5">
    <label class="block text-sm font-medium text-base-content mb-1.5"
           for="{{ attrs.id }}">{% slot label %}{% endslot %}</label>
    <textarea {% if attrs.required %}required{% endif %}
              {% if attrs.rows %}rows="{{ attrs.rows }}"{% endif %}
              {% if attrs.disabled %}disabled{% endif %}
              {% if attrs.readonly %}readonly{% endif %}
              {% if attrs.checked %}checked{% endif %}
              {% if attrs.name %}name="{{ attrs.name }}"{% endif %}
              {% if attrs.id %}id="{{ attrs.id }}"{% endif %}
              {% if attrs.placeholder %}placeholder="{{ attrs.placeholder }}"{% endif %}
              class="textarea textarea-bordered border-base-300 w-full bg-base-100 focus:border-primary focus:outline-none">{% slot value %}{% endslot %}</textarea>
  </div>
{% elif attrs.type == "radio" %}
  <div class="mb-5">
    <label class="flex items-center gap-3 cursor-pointer" for="{{ attrs.id }}">
      <input {% if attrs.required %}required{% endif %}
             {% if attrs.disabled %}disabled{% endif %}
             {% if attrs.readonly %}readonly{% endif %}
             {% if attrs.checked %}checked{% endif %}
             {% if attrs.name %}name="{{ attrs.name }}"{% endif %}
             {% if attrs.id %}id="{{ attrs.id }}"{% endif %}
             {% if attrs.placeholder %}placeholder="{{ attrs.placeholder }}"{% endif %}
             {% if attrs.autocomplete %}autocomplete="{{ attrs.autocomplete }}"{% endif %}
             value="{{ attrs.value|default_if_none:"" }}"
             type="{{ attrs.type }}"
             class="radio radio-primary" />
      <span class="text-sm text-base-content">{% slot label %}{% endslot %}</span>
    </label>
  </div>
{% elif attrs.type == "checkbox" %}
  <div class="mb-5">
    <label class="flex items-center gap-3 cursor-pointer" for="{{ attrs.id }}">
      <input {% if attrs.required %}required{% endif %}
             {% if attrs.disabled %}disabled{% endif %}
             {% if attrs.readonly %}readonly{% endif %}
             {% if attrs.checked %}checked{% endif %}
             {% if attrs.name %}name="{{ attrs.name }}"{% endif %}
             {% if attrs.id %}id="{{ attrs.id }}"{% endif %}
             value="{{ attrs.value|default_if_none:"" }}"
             type="checkbox"
             class="checkbox checkbox-primary" />
      <span class="text-sm text-base-content">{% slot label %}{% endslot %}</span>
    </label>
  </div>
{% else %}
  <div class="mb-5">
    <label class="block text-sm font-medium text-base-content mb-1.5"
           for="{{ attrs.id }}">{% slot label %}{% endslot %}</label>
    <input {% if attrs.required %}required{% endif %}
           {% if attrs.disabled %}disabled{% endif %}
           {% if attrs.readonly %}readonly{% endif %}
           {% if attrs.checked %}checked{% endif %}
           {% if attrs.name %}name="{{ attrs.name }}"{% endif %}
           {% if attrs.id %}id="{{ attrs.id }}"{% endif %}
           {% if attrs.placeholder %}placeholder="{{ attrs.placeholder }}"{% endif %}
           {% if attrs.autocomplete %}autocomplete="{{ attrs.autocomplete }}"{% endif %}
           value="{{ attrs.value|default_if_none:"" }}"
           type="{{ attrs.type }}"
           class="input w-full border border-base-300 bg-base-100 focus:border-primary focus:outline-none" />
  </div>
{% endif %}
{% if slots.help_text %}
  <div class="text-xs text-base-content/50 -mt-3.5 mb-5">{% slot help_text %}{% endslot %}</div>
{% endif %}
