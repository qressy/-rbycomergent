name: rbycomergent

volumes:
  production_postgres_data: {}
  production_postgres_data_backups: {}
  production_caddy_data: {}
  production_caddy_config: {}
  production_caddy_logs: {}

  production_redis_data: {}


x-django: &django
  image: rbycomergent_production_django
  depends_on:
    migrate:
      condition: service_completed_successfully
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  env_file:
    - ./.env.production
  command: /start
  healthcheck:
    test:
      - CMD
      - python
      - -c
      - "import os, urllib.request; request = urllib.request.Request('http://127.0.0.1:5000/healthz/', headers={'Host': os.environ['CHATTERSIFT_SITE_DOMAIN'], 'X-Forwarded-Proto': 'https'}); urllib.request.urlopen(request, timeout=5)"
    interval: 5s
    timeout: 5s
    retries: 3
    start_period: 5s

services:
  django:
    <<: *django
    build:
      context: .
      dockerfile: ./compose/production/django/Dockerfile

  postgres:
    build:
      context: .
      dockerfile: ./compose/production/postgres/Dockerfile
    image: rbycomergent_production_postgres
    volumes:
      - production_postgres_data:/var/lib/postgresql/data
      - production_postgres_data_backups:/backups
    env_file:
      - ./.env.production
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 2s
      timeout: 3s
      retries: 5

  migrate:
    <<: *django
    image: rbycomergent_production_django
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Interface: deployment-time Django setup that must complete before long-running app processes start.
    command: bash -c "python /app/manage.py migrate --noinput && python /app/manage.py sync_site_domain"
    restart: "no"
    healthcheck:
      disable: true

  caddy:
    build:
      context: .
      dockerfile: ./compose/production/caddy/Dockerfile
    image: rbycomergent_production_caddy
    depends_on:
      django:
        condition: service_healthy
    env_file:
      - ./.env.production
    volumes:
      - production_caddy_data:/data
      - production_caddy_config:/config
      - production_caddy_logs:/var/log/caddy
    ports:
      - '0.0.0.0:80:80'
      - '0.0.0.0:443:443'

  redis:
    image: docker.io/redis:7.2

    volumes:
      - production_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 5


  celeryworker:
    <<: *django
    image: rbycomergent_production_django
    command: /start-celeryworker
    healthcheck:
      disable: true

  celerybeat:
    <<: *django
    image: rbycomergent_production_django
    command: /start-celerybeat
    healthcheck:
      disable: true

  awscli:
    build:
      context: .
      dockerfile: ./compose/production/aws/Dockerfile
    env_file:
      - ./.env.production
    volumes:
      - production_postgres_data_backups:/backups:z
