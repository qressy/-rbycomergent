volumes:
  postgres_data:
  postgres_backups:
  redis_data:

x-django: &django
  build:
    context: .
    dockerfile: ./compose/production/django/Dockerfile
  depends_on:
    migrate:
      condition: service_completed_successfully
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  env_file:
    - .env
  restart: unless-stopped
  healthcheck:
    test:
      - CMD
      - python
      - -c
      - "import os, urllib.request; request = urllib.request.Request('http://127.0.0.1:5000/healthz/', headers={'Host': os.environ['CHATTERSIFT_SITE_DOMAIN'], 'X-Forwarded-Proto': 'https'}); urllib.request.urlopen(request, timeout=5)"
    interval: 5s
    timeout: 5s
    retries: 3
    start_period: 5s

services:
  django:
    <<: *django
    container_name: rslash-django
    expose:
      - "5000"
    command: /start

  postgres:
    container_name: rslash-postgres
    build:
      context: .
      dockerfile: ./compose/production/postgres/Dockerfile
    env_file:
      - .env
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - postgres_backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 2s
      timeout: 3s
      retries: 5

  migrate:
    <<: *django
    container_name: rslash-migrate
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: bash -c "python /app/manage.py migrate --noinput && python /app/manage.py sync_site_domain"
    restart: "no"
    healthcheck:
      disable: true

  redis:
    container_name: rslash-redis
    image: docker.io/redis:7.2
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 5

  celeryworker:
    <<: *django
    container_name: rslash-celeryworker
    command: /start-celeryworker
    healthcheck:
      disable: true

  celerybeat:
    <<: *django
    container_name: rslash-celerybeat
    command: /start-celerybeat
    healthcheck:
      disable: true
